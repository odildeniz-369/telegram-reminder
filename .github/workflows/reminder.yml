name: Telegram Reminder

on:
  schedule:
    - cron: '18 15 2 5 *'
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install python-telegram-bot
      - run: python reminder.py
